<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Clon de Educacion Continua IPSS">
    <title>Evaluación 1 diplomado full stack Sergio y Tomás</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/custom.css">
    <script src="js/main.js"></script>
</head>
<body>
    <main class="main-content">
    <section id="formulario" class="mitad-superior" label="Diplomados 2026 IPSS">
        <div class="container-fluid contenedor-superior">
            <div class="row align-items-center min-vh-100">
                <div class="col-12 col-lg-7 lado-izquierdo">
                <header class="encabezado">
                    <img
                        src="https://educacioncontinua.ipss.cl/images/logo-wide.png"
                        alt="Instituto Profesional San Sebastián"
                        class="logo-ipss"
                    >
                </header>
                    <div class="bloque-titulo">
                        <h1>Diplomados 2026</h1>
                        <h2>
                            Potencia tu Perfil Profesional
                        </h2>
                        <hr class="linea-dorada">
                        <div class="aviso-inicio">
                            <span>Inicio:</span>
                            <strong>Julio 2026</strong>
                        </div>
                        <div class="lista-beneficios">
                            <article class="beneficio">
                                <span class="icono-beneficio">#</span>
                                <p>Genera networking compartiendo tus experiencias</p>
                            </article>
                            <article class="beneficio">
                                <span class="icono-beneficio">#</span>
                                <p>Plataforma de aprendizaje 24/7</p>
                            </article>
                            <article class="beneficio">
                                <span class="icono-beneficio">#</span>
                                <p>Clases sincrónicas y asincrónicas con docentes expertos en la industria.</p>
                            </article>
                            <article class="beneficio">
                                <span class="icono-beneficio">#</span>
                                <p>Apoyo permanente de tutores</p>
                            </article>
                        </div>
                    </div> 
                </div> 
            </div>
        <div class="col-12 col-lg-5 formulario">
            <form class="caja-formulario" id="formularioInformacion">
                <h3>¡Solicita ahora más información!</h3>
                <div class="campo-formulario">
                    <label for="nombre">Nombre*</label>
                    <input type="text" id="nombre" name="nombre" class="form-control" required>
                </div>
                <div class="campo-formulario">
                    <label for="apellidos">Apellidos*</label>
                    <input type="text" id="apellidos" name="apellidos" class="form-control" required>
                </div>
                <div class="campo-formulario">
                    <label for="email">Email*</label>
                    <input type="email" id="email" name="email" class="form-control" required>
                </div>
                <div class="campo-formulario">
                    <label for="contacto">Número de contacto*</label>

                        <div class="row g-2">
                            <div class="col-4">
                                <select id="pais" name="pais" class="form-select">
                                    <option value="+56">Chile</option>
                                </select>
                            </div>
                            <div class="col-8">
                                <input type="tel" id="contacto" name="contacto" class="form-control" placeholder="+56" required>
                            </div>
                        </div>
                    </div>
                    <div class="campo-formulario">
                        <label for="rut">RUT*</label>
                        <input type="text" id="rut" name="rut" class="form-control"     placeholder="12345678-9" required>
                        <small id="mensajeRut" class="mensaje-validacion"></small>
                    </div>
                    <div class="campo-formulario">
                        <label for="jornada">Jornada de interés*</label>
                        <select id="jornada" name="jornada" class="form-select" required>
                            <option value="">Selecciona</option>
                            <option value="online">Online</option>
                        </select>
                    </div>
                    <div class="campo-formulario">
                        <label for="diplomado">Diplomados*</label>
                        <select id="diplomado" name="diplomado" class="form-select" required>
                            <option value="">Selecciona</option>
                            <option value="ciberseguridad">Diplomado en Ciberseguridad</option>
                            <option value="redes-industriales">Diplomado en Redes Industriales</option>
                            <option value="fullstack">Diplomado en Fullstack</option>
                            <option value="infraestructura-cloud">Diplomado en Infraestructura Cloud</option>
                            <option value="arquitectura-cloud">Diplomado en Arquitectura Cloud</option>
                            <option value="seguridad-ofensiva">Diplomado en Seguridad Ofensiva</option>
                        </select>
                    </div>
                    <div class="form-check aceptacion-politicas">
                        <input class="form-check-input" type="checkbox" id="privacidad" required>
                        <label class="form-check-label" for="privacidad">
                            Acepto las políticas de privacidad de IPSS*
                        </label>
                    </div>
                    <button type="submit" class="btn boton-enviar w-100">
                        Enviar
                    </button>
                    <p id="mensajeFormulario" class="mensaje-formulario"></p>
            </form>

        </div> 
    </section>
    
    <section id="diplomados" class="mitad-inferior" label="Listado de diplomados">
        <!-- Sergio -->
    </section>

</body></html>
